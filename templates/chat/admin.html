<!-- 创建用户模态框 -->
<div id="createUserModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>添加新用户</h3>
            <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="createUserForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>用户名 <span class="required">*</span></label>
                        <input type="text" id="newUsername" required>
                    </div>
                    <div class="form-group">
                        <label>密码 <span class="required">*</span></label>
                        <input type="password" id="newPassword" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>确认密码 <span class="required">*</span></label>
                        <input type="password" id="newPasswordConfirm" required>
                    </div>

                    <div class="form-group">
                        <label>邮箱 <span class="required">*</span></label>
                        <input type="email" id="newEmail" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>真实姓名</label>
                        <input type="text" id="newRealName">
                    </div>

                    <div class="form-group">
                        <label>性别 </label>
                        <select id="newGender">
                            <option value="">请选择</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="newPhone">
                    </div>
                    <div class="form-group">
                        <label>部门</label>
                        <input type="text" id="newDepartment">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>职位</label>
                        <input type="text" id="newPosition">
                    </div>
                    <div class="form-group">
                        <label>用户类型</label>
                        <select id="newUserType">
                            <option value="normal">普通用户</option>
                            <option value="admin">管理员</option>
                            <option value="super_admin">超级管理员</option>
                        </select>
                    </div>
                </div>


<!--                <div class="form-row">-->

                    <!-- 好友分配区域 -->
                    <div class="form-group">
                        <label><i class="fas fa-user-friends"></i> 分配好友</label>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="friendSearchCreate" placeholder="搜索用户...">
                        </div>
                        <div class="member-grid" id="friendGridCreate">
                            <!-- 好友列表将动态生成 -->
                        </div>
                        <small class="form-hint">点击用户选择/取消好友，选中的用户将出现在该用户的通讯录中</small>
                    </div>

<!--                </div>-->

            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="adminConsole.closeModal('createUserModal')">取消</button>
            <button class="btn btn-primary" onclick="adminConsole.createUser()">创建用户</button>
        </div>
    </div>
</div>

<!-- 编辑用户模态框 -->

                    </div>

                    <div class="form-group">

                </div>
                <div class="form-row">

                    <div class="form-group">

                </div>

                    <div class="form-group">
                        <label>用户类型</label>

                        </select>
                    </div>
                </div>


                <!-- 好友选择区域 -->

            </form>
        </div>
        <div class="modal-footer">
            <!--                <button class="btn btn-danger" onclick="adminConsole.deleteUser()">删除用户</button>-->
            <button class="btn btn-secondary" onclick="adminConsole.closeModal('editUserModal')">取消</button>
            <button class="btn btn-primary" onclick="adminConsole.updateUser()">保存修改</button>
        </div>
    </div>

<!-- 版本检测脚本（简化版，移除无效的 document.write） -->
<script>
    // 从构建时注入的版本号
    const CURRENT_VERSION = '20260305-1';

    // 检查版本是否更新
    const LAST_VERSION = sessionStorage.getItem('appVersion');
    if (LAST_VERSION && LAST_VERSION !== CURRENT_VERSION) {
        console.log(`✅ 检测到新版本: ${LAST_VERSION} → ${CURRENT_VERSION}`);
        sessionStorage.setItem('appVersion', CURRENT_VERSION);

        // 5秒后自动提示刷新（避免打断用户操作）
        setTimeout(() => {
            if (confirm('🎉 检测到新版本，是否立即刷新以加载最新功能？')) {
                // 清除 Service Worker 缓存
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(registrations => {
                        registrations.forEach(reg => reg.unregister());
                    });
                }
                // 强制刷新
                location.reload(true);
            }
        }, 5000);
    } else {
        sessionStorage.setItem('appVersion', CURRENT_VERSION);
    }
</script>
